<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人代購作業助手</title>
    
    <!-- 1. 載入 CSS -->
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <style>
        @import url('[https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap](https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap)');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F2ECE4; }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
        select { -webkit-appearance: none; appearance: none; }
    </style>

    <!-- 2. 載入基礎核心庫 -->
    <script src="[https://unpkg.com/react@18/umd/react.production.min.js](https://unpkg.com/react@18/umd/react.production.min.js)"></script>
    <script src="[https://unpkg.com/react-dom@18/umd/react-dom.production.min.js](https://unpkg.com/react-dom@18/umd/react-dom.production.min.js)"></script>
    <script src="[https://unpkg.com/lucide@latest](https://unpkg.com/lucide@latest)"></script>
    <script src="[https://unpkg.com/lucide-react@latest](https://unpkg.com/lucide-react@latest)"></script>

    <!-- 3. 載入 Firebase (Compat 模式最穩定) -->
    <script src="[https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js](https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js)"></script>
    <script src="[https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js](https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js)"></script>
    <script src="[https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js](https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js)"></script>

    <!-- 4. 最後才載入 Babel 轉譯器 -->
    <script src="[https://unpkg.com/@babel/standalone/babel.min.js](https://unpkg.com/@babel/standalone/babel.min.js)"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 防止變數衝突，將代碼包裝在 IIFE 中
        (() => {
            const { useState, useEffect, useMemo, useRef } = React;
            
            // 重要：一定要從 window.LucideReact 取得，且首字母大寫
            const LucideIcons = window.LucideReact;
            if (!LucideIcons) {
                console.error("Lucide 載入失敗");
                return;
            }

            const { 
                Package, ShoppingCart, Camera, Settings: SettingsIcon, PlusCircle, MinusCircle, 
                Copy, Send, Loader2, X, Tag, Calculator, ChevronDown, CheckCircle2, AlertCircle, Filter, Trash2
            } = LucideIcons;

            // --- 核心配置：請將您從 Firebase Console 複製的 JSON 貼在此處 ---
            const firebaseConfig = {
                apiKey: "AIzaSyASLINtHCAfw8kzW00vENpqMP1--I6eHWE",
                authDomain: "my-proxy-helper.firebaseapp.com",
                projectId: "my-proxy-helper",
                storageBucket: "my-proxy-helper.firebasestorage.app",
                messagingSenderId: "692403246929",
                appId: "1:692403246929:web:94dade7422ad100918a570"
            };

            const GAS_WEBHOOK_URL = "[https://script.google.com/macros/s/AKfycbx8k3PYh9E2yrQaJcSPHjswMr4Vf4e9_HY9P1b_lBtV35NoTpqkMg1jk1zbBodQJ1zSYg/exec](https://script.google.com/macros/s/AKfycbx8k3PYh9E2yrQaJcSPHjswMr4Vf4e9_HY9P1b_lBtV35NoTpqkMg1jk1zbBodQJ1zSYg/exec)";

            // 初始化 Firebase
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            const auth = firebase.auth();
            const db = firebase.firestore();
            const appId = 'proxy-assistant-v1';

            const App = () => {
                const [user, setUser] = useState(null);
                const [activeTab, setActiveTab] = useState('order');
                const [products, setProducts] = useState([]);
                const [loading, setLoading] = useState(true);
                const [copyStatus, setCopyStatus] = useState(false);
                const [isSubmitting, setIsSubmitting] = useState(false);
                const [customerName, setCustomerName] = useState('');
                const [cart, setCart] = useState({});
                const [generatedMsg, setGeneratedMsg] = useState('');
                const [orderFilterCategory, setOrderFilterCategory] = useState('全部');
                const [settings, setSettings] = useState({
                    bankInfo: '銀行代碼：000\n帳號：1234-5678-9012\n戶名：您的名字',
                    categories: ["哆啦A夢", "進擊的巨人", "任天堂", "迪士尼", "Beams", "其他"]
                });
                const [newProduct, setNewProduct] = useState({ category: '其他', name: '', originalPrice: '', proxyPrice: '', imageUrl: '' });
                const [newCatInput, setNewCatInput] = useState('');
                const fileInputRef = useRef(null);

                useEffect(() => {
                    auth.signInAnonymously().then(cred => setUser(cred.user));
                    
                    const unsubP = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('products')
                        .onSnapshot((snap) => {
                            setProducts(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                            setLoading(false);
                        });

                    auth.onAuthStateChanged(u => {
                        if(u) {
                            db.collection('artifacts').doc(appId).collection('users').doc(u.uid).collection('settings').doc('config')
                            .onSnapshot(doc => { if(doc.exists) setSettings(prev => ({...prev, ...doc.data()})); });
                        }
                    });
                    return () => unsubP();
                }, []);

                const calculateProxyPrice = (orig) => {
                    if (!orig || isNaN(orig)) return '';
                    const raw = Number(orig) * 0.2 * 1.1;
                    return raw % 10 === 0 ? raw : Math.ceil(raw / 10) * 10;
                };

                const handleAddProduct = async () => {
                    if (!newProduct.name || !newProduct.proxyPrice) return;
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('products').add({...newProduct, createdAt: Date.now()});
                    setNewProduct({category:'其他', name:'', originalPrice:'', proxyPrice:'', imageUrl:''});
                    alert("商品已入庫");
                };

                if (loading) return <div className="flex h-screen items-center justify-center bg-[#F2ECE4]"><Loader2 className="animate-spin text-[#A68B77] w-10 h-10" /></div>;

                return (
                    <div className="max-w-md mx-auto min-h-screen flex flex-col text-[#5D544C]">
                        <header className="px-6 py-6 flex justify-between items-center bg-white/40 backdrop-blur-md sticky top-0 z-50">
                            <h1 className="text-xl font-bold flex items-center gap-2"><Package className="text-[#A68B77] w-5 h-5" />代購小助手</h1>
                            <div className="flex items-center gap-1.5 px-2.5 py-1 bg-white/60 rounded-full border border-[#E5DED4]">
                                <div className="w-1.5 h-1.5 bg-[#A68B77] rounded-full animate-pulse"></div>
                                <span className="text-[10px] font-bold">連線中</span>
                            </div>
                        </header>

                        <main className="flex-1 px-5 py-4 pb-32">
                            <div className="flex gap-1.5 mb-8 bg-[#EAE3DB] p-1.5 rounded-2xl">
                                {[{id:'order',l:'接單',i:ShoppingCart},{id:'admin',l:'管理',i:Camera},{id:'settings',l:'設定',i:SettingsIcon}].map(t => (
                                    <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex-1 flex flex-col items-center py-2.5 rounded-xl transition-all ${activeTab === t.id ? 'bg-white shadow-sm' : 'opacity-60'}`}>
                                        <t.i size={16}/><span className="text-[10px] font-black mt-1">{t.l}</span>
                                    </button>
                                ))}
                            </div>

                            {activeTab === 'order' && (
                                <div className="space-y-6 animate-in">
                                    <section className="bg-white p-6 rounded-[2rem] border border-[#E5DED4] shadow-sm space-y-4">
                                        <input type="text" placeholder="客戶姓名" className="w-full p-4 bg-[#F9F7F5] rounded-2xl outline-none font-bold" value={customerName} onChange={e => setCustomerName(e.target.value)} />
                                        <div className="relative">
                                            <select className="w-full p-4 bg-white border border-[#E5DED4] rounded-2xl font-bold" value={orderFilterCategory} onChange={e => setOrderFilterCategory(e.target.value)}>
                                                <option value="全部">全部商品</option>
                                                {settings.categories.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                            <ChevronDown className="absolute right-4 top-1/2 -translate-y-1/2 text-[#C4BCB4]" size={16}/>
                                        </div>
                                    </section>
                                    <div className="space-y-3">
                                        {products.filter(p => orderFilterCategory === '全部' || p.category === orderFilterCategory).map(p => (
                                            <div key={p.id} className="bg-white p-3 rounded-2xl border border-[#E5DED4] flex items-center gap-4">
                                                <div className="w-16 h-16 bg-[#F9F7F5] rounded-xl overflow-hidden shrink-0">
                                                    {p.imageUrl ? <img src={p.imageUrl} className="w-full h-full object-cover" /> : <Package size={20} className="m-6 text-[#D9C5B2]" />}
                                                </div>
                                                <div className="flex-1 truncate">
                                                    <p className="text-[9px] font-black text-[#A68B77]">{p.category}</p>
                                                    <h4 className="font-bold text-sm truncate">{p.name}</h4>
                                                    <p className="font-black text-[#A68B77]">${p.proxyPrice}</p>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <button onClick={() => { const q = (cart[p.id] || 0) - 1; if(q<=0){const {[p.id]:_, ...rest}=cart; setCart(rest)}else{setCart({...cart,[p.id]:q})} }}><MinusCircle size={24} className="text-[#C4BCB4]"/></button>
                                                    <span className="font-bold w-4 text-center">{cart[p.id] || 0}</span>
                                                    <button onClick={() => setCart({...cart,[p.id]:(cart[p.id]||0)+1})}><PlusCircle size={24} className="text-[#A68B77]"/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    {Object.keys(cart).length > 0 && (
                                        <div className="fixed bottom-6 left-4 right-4 bg-[#5D544C] text-white p-5 rounded-[2rem] flex justify-between items-center shadow-xl z-50">
                                            <p className="text-xl font-bold">${Object.entries(cart).reduce((s,[id,q])=>s+(products.find(p=>p.id===id)?.proxyPrice||0)*q,0)}</p>
                                            <button onClick={() => {
                                                const itemsText = Object.entries(cart).map(([id, q]) => { const p = products.find(i => i.id === id); return `${p.name} x ${q} = $${p.proxyPrice * q}`; }).join('\n');
                                                setGeneratedMsg(`【代購訂單】\n客戶：${customerName}\n\n明細：\n${itemsText}\n\n匯款資訊：\n${settings.bankInfo}`);
                                            }} className="bg-white text-[#5D544C] px-6 py-2 rounded-xl font-bold text-sm">產生訊息</button>
                                        </div>
                                    )}
                                    {generatedMsg && (
                                        <div className="bg-white p-6 rounded-[2rem] border-2 border-[#F2ECE4] space-y-4 shadow-xl mb-32">
                                            <pre className="text-xs whitespace-pre-wrap leading-relaxed bg-[#F9F7F5] p-5 rounded-2xl max-h-48 overflow-y-auto">{generatedMsg}</pre>
                                            <button onClick={() => { navigator.clipboard.writeText(generatedMsg); setCopyStatus(true); setTimeout(()=>setCopyStatus(false),2000); }} className="w-full bg-[#F2ECE4] py-3 rounded-xl font-bold text-xs">{copyStatus?'已複製':'複製訊息'}</button>
                                            <button onClick={submitToSheets} disabled={isSubmitting} className="w-full bg-[#A68B77] text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2">{isSubmitting ? <Loader2 className="animate-spin" size={16}/> : <Send size={16}/>} 同步至總表</button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'admin' && (
                                <div className="space-y-6 animate-in">
                                    <section className="bg-white p-6 rounded-[2rem] border border-[#E5DED4] shadow-sm space-y-6">
                                        <h3 className="font-black text-base flex items-center gap-2"><PlusCircle size={18}/>錄入商品</h3>
                                        <div onClick={() => fileInputRef.current.click()} className="w-full h-40 bg-[#F9F7F5] rounded-2xl border-2 border-dashed border-[#DCD9CD] flex flex-col items-center justify-center cursor-pointer overflow-hidden relative">
                                            {newProduct.imageUrl ? <img src={newProduct.imageUrl} className="w-full h-full object-cover" /> : <><Camera size={40} className="text-[#C4BCB4] mb-2"/><span className="text-[10px] font-black text-[#C4BCB4]">拍攝照片</span></>}
                                            {newProduct.imageUrl && <button onClick={(e)=>{e.stopPropagation(); setNewProduct(p=>({...p,imageUrl:''}));}} className="absolute top-2 right-2 bg-black/40 text-white p-1.5 rounded-full"><X size={14}/></button>}
                                        </div>
                                        <input type="file" accept="image/*" className="hidden" ref={fileInputRef} onChange={e => { const r = new FileReader(); r.onloadend = () => setNewProduct(p => ({...p, imageUrl: r.result})); r.readAsDataURL(e.target.files[0]); }} />
                                        <div className="space-y-4">
                                            <select className="w-full p-4 bg-white border border-[#E5DED4] rounded-2xl font-bold" value={newProduct.category} onChange={e => setNewProduct(p => ({...p, category: e.target.value}))}>{settings.categories.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                            <input type="text" placeholder="品名" className="w-full p-4 bg-[#F9F7F5] rounded-2xl font-bold" value={newProduct.name} onChange={e => setNewProduct(p => ({...p, name: e.target.value}))} />
                                            <div className="grid grid-cols-2 gap-4">
                                                <input type="number" placeholder="原價" className="p-4 bg-[#F9F7F5] rounded-2xl font-bold" value={newProduct.originalPrice} onChange={e => { const pr = calculateProxyPrice(e.target.value); setNewProduct(p => ({...p, originalPrice: e.target.value, proxyPrice: pr})); }} />
                                                <input type="number" placeholder="代購價" className="p-4 bg-[#F9F7F5] rounded-2xl font-bold text-[#A68B77]" value={newProduct.proxyPrice} readOnly />
                                            </div>
                                        </div>
                                        <button onClick={handleAddProduct} className="w-full bg-[#5D544C] text-white py-4 rounded-2xl font-bold">存入庫存</button>
                                    </section>
                                </div>
                            )}

                            {activeTab === 'settings' && (
                                <div className="space-y-6 animate-in">
                                    <section className="bg-white p-7 rounded-[2rem] border border-[#E5DED4] shadow-sm space-y-7">
                                        <textarea rows="5" className="w-full p-5 bg-[#F9F7F5] rounded-2xl text-xs font-mono outline-none text-[#5D544C]" value={settings.bankInfo} onChange={e => setSettings({...settings, bankInfo: e.target.value})} />
                                        <button onClick={() => { db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('config').set(settings); alert("設定更新"); }} className="w-full bg-[#5D544C] text-white py-4 rounded-2xl font-black">更新設定</button>
                                    </section>
                                </div>
                            )}
                        </main>
                        <footer className="py-10 text-center opacity-20 text-[9px] font-bold tracking-[0.4em]">© 2026 PROXY ASSISTANT</footer>
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        })();
    </script>
</body>
</html>
