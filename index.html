<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人代購作業助手</title>
    
    <!-- 1. 載入 CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F2ECE4; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
        select { -webkit-appearance: none; appearance: none; }
    </style>

    <!-- 2. 核心庫 (順序必須正確) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- 3. 圖示庫 (只保留 React 版，避免 Infinity 衝突) -->
    <script src="https://unpkg.com/lucide-react@0.263.1/dist/umd/lucide-react.min.js"></script>

    <!-- 4. Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- 5. 轉譯器 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.10/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        (() => {
            const { useState, useEffect, useMemo, useRef } = React;
            
            // 修正圖示組件，確保能直接抓取 Lucide 資源
const Icon = ({ name, size = 24, className = "" }) => {
    const Lib = window.LucideReact || window.lucide;
    // 如果找不到圖示，回傳 null 而不再顯示灰色圓圈
    if (!Lib || !Lib[name]) return null;
    const LucideIcon = Lib[name];
    return <LucideIcon size={size} className={className} />;
};

            // --- 核心配置：請務必填入您的 Firebase 資訊 ---
            const firebaseConfig = {
                apiKey: "AIzaSyASLINtHCAfw8kzW00vENpqMP1--I6eHWE",
                authDomain: "my-proxy-helper.firebaseapp.com",
                projectId: "my-proxy-helper",
                storageBucket: "my-proxy-helper.firebasestorage.app",
                messagingSenderId: "692403246929",
                appId: "1:692403246929:web:94dade7422ad100918a570",
            };

            const GAS_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbx8k3PYh9E2yrQaJcSPHjswMr4Vf4e9_HY9P1b_lBtV35NoTpqkMg1jk1zbBodQJ1zSYg/exec";

            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();
            const appId = 'proxy-assistant-v1';

            const App = () => {
                const [user, setUser] = useState(null);
                const [activeTab, setActiveTab] = useState('order');
                const [products, setProducts] = useState([]);
                const [loading, setLoading] = useState(true);
                const [customerName, setCustomerName] = useState('');
                const [cart, setCart] = useState({});
                const [generatedMsg, setGeneratedMsg] = useState('');
                const [copyStatus, setCopyStatus] = useState(false);
                const [isSubmitting, setIsSubmitting] = useState(false);
                const [orderFilterCategory, setOrderFilterCategory] = useState('全部');
                const [settings, setSettings] = useState({
                    bankInfo: '銀行代碼：000\n帳號：1234-5678-9012\n戶名：您的名字',
                    categories: ["哆啦A夢", "進擊的巨人", "任天堂", "迪士尼", "Beams", "其他"]
                });
                const [newProduct, setNewProduct] = useState({ category: '其他', name: '', originalPrice: '', proxyPrice: '', imageUrl: '' });
                const [newCatInput, setNewCatInput] = useState('');
                const fileInputRef = useRef(null);

                useEffect(() => {
                    auth.signInAnonymously().then(cred => setUser(cred.user));
                    
                    const unsubP = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('products')
                        .onSnapshot((snap) => {
                            setProducts(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                            setLoading(false);
                        }, (err) => setLoading(false));

                    const unsubAuth = auth.onAuthStateChanged(u => {
                        if(u) {
                            setUser(u);
                            db.collection('artifacts').doc(appId).collection('users').doc(u.uid).collection('settings').doc('config')
                            .onSnapshot(doc => { if(doc.exists) setSettings(prev => ({...prev, ...doc.data()})); });
                        }
                    });
                    return () => { unsubP(); unsubAuth(); };
                }, []);

                const calculateProxyPrice = (orig) => {
                    if (!orig || isNaN(orig)) return '';
                    const raw = Number(orig) * 0.2 * 1.1;
                    return raw % 10 === 0 ? raw : Math.ceil(raw / 10) * 10;
                };

                const submitToSheets = async () => {
                    if (!customerName) return alert("請輸入姓名");
                    setIsSubmitting(true);
                    const orderItems = Object.entries(cart).map(([id, qty]) => {
                        const p = products.find(item => item.id === id);
                        return { category: p.category, name: p.name, origPrice: p.originalPrice, proxyPrice: p.proxyPrice, qty };
                    });
                    try {
                        await fetch(GAS_WEBHOOK_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ customerName, items: orderItems, timestamp: new Date().toLocaleString() }) });
                        alert("訂單已同步至總表！");
                        setCart({}); setCustomerName(''); setGeneratedMsg('');
                    } catch (e) { alert("同步失敗"); }
                    finally { setIsSubmitting(false); }
                };

                const saveGlobalSettings = async () => {
                    if (!user) return alert("尚未連線");
                    try {
                        await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('config').set(settings);
                        alert("設定已儲存");
                    } catch (e) { alert("儲存失敗"); }
                };

                if (loading) return <div className="flex h-screen items-center justify-center"><Icon name="Loader2" className="animate-spin text-[#A68B77]" size={40} /></div>;

                return (
                    <div className="max-w-md mx-auto min-h-screen flex flex-col text-[#5D544C]">
                        <header className="px-6 py-6 flex justify-between items-center bg-white/40 backdrop-blur-md sticky top-0 z-50">
    <h1 className="text-xl font-bold flex items-center gap-2">
        {/* 這裡新增了 Package 圖示 */}
        <Icon name="Package" className="text-[#A68B77]" size={22} /> 
        代購小助手
    </h1>
    <div className="flex items-center gap-1.5 px-2.5 py-1 bg-white/60 rounded-full border border-[#E5DED4]">
        <div className="w-1.5 h-1.5 bg-[#A68B77] rounded-full animate-pulse"></div>
        <span className="text-[10px] font-bold">連線中</span>
    </div>
</header>

                        <main className="flex-1 px-5 py-4 pb-32">
    <div className="flex gap-1.5 mb-8 bg-[#EAE3DB] p-1.5 rounded-2xl shadow-inner">
        {[
            { id: 'order', label: '快速接單', icon: 'ShoppingCart' },
            { id: 'admin', label: '商品管理', icon: 'Camera' },
            { id: 'settings', label: '系統設定', icon: 'Settings' },
        ].map(t => (
            <button 
                key={t.id} 
                onClick={() => setActiveTab(t.id)} 
                className={`flex-1 flex flex-col items-center py-2.5 rounded-xl transition-all duration-300 ${activeTab === t.id ? 'bg-white shadow-sm' : 'opacity-60'}`}
            >
                <Icon name={t.icon} size={18}/>
                <span className="text-[10px] font-black mt-1">{t.label}</span>
            </button>
        ))}
    </div>

                            {activeTab === 'order' && (
                                <div className="space-y-6 animate-in">
                                    <section className="bg-white p-6 rounded-[2rem] border border-[#E5DED4] shadow-sm space-y-4">
                                        <input type="text" placeholder="客戶姓名" className="w-full p-4 bg-[#F9F7F5] rounded-2xl outline-none font-bold" value={customerName} onChange={e => setCustomerName(e.target.value)} />
                                        <div className="relative">
                                            <select className="w-full p-4 bg-white border border-[#E5DED4] rounded-2xl font-bold appearance-none" value={orderFilterCategory} onChange={e => setOrderFilterCategory(e.target.value)}>
                                                <option value="全部">全部商品</option>
                                                {settings.categories.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                            <Icon name="ChevronDown" className="absolute right-4 top-1/2 -translate-y-1/2 text-[#C4BCB4]" size={16}/>
                                        </div>
                                    </section>
                                    <div className="space-y-3 pb-20">
                                        {products.filter(p => orderFilterCategory === '全部' || p.category === orderFilterCategory).map(p => (
                                            <div key={p.id} className="bg-white p-3 rounded-2xl border border-[#E5DED4] flex items-center gap-4 active:scale-[0.98]">
                                                <div className="w-16 h-16 bg-[#F9F7F5] rounded-xl overflow-hidden shrink-0">
                                                    {p.imageUrl ? <img src={p.imageUrl} className="w-full h-full object-cover" /> : <Icon name="Package" className="m-7 text-[#D9C5B2]" size={24} />}
                                                </div>
                                                <div className="flex-1 truncate">
                                                    <p className="text-[9px] font-black text-[#A68B77] uppercase">{p.category}</p>
                                                    <h4 className="font-bold text-sm truncate">{p.name}</h4>
                                                    <p className="font-black text-[#A68B77] text-lg">${p.proxyPrice}</p>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <button onClick={() => { const q = (cart[p.id] || 0) - 1; if(q<=0){const {[p.id]:_, ...rest}=cart; setCart(rest)}else{setCart({...cart,[p.id]:q})} }}><Icon name="MinusCircle" size={28} className="text-[#C4BCB4]"/></button>
                                                    <span className="font-bold min-w-[20px] text-center">{cart[p.id] || 0}</span>
                                                    <button onClick={() => setCart({...cart,[p.id]:(cart[p.id]||0)+1})}><Icon name="PlusCircle" size={28} className="text-[#A68B77]"/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    {Object.keys(cart).length > 0 && (
    <div className="fixed bottom-6 left-4 right-4 bg-[#5D544C] text-white p-5 rounded-[2rem] flex justify-between items-center shadow-xl z-50 animate-in">
        <p className="text-2xl font-black">${Object.entries(cart).reduce((s,[id,q])=>s+(products.find(p=>p.id===id)?.proxyPrice||0)*q,0)}</p>
        <button onClick={() => {
            const totalAmount = Object.entries(cart).reduce((s,[id,q])=>s+(products.find(p=>p.id===id)?.proxyPrice||0)*q,0);
            const itemsText = Object.entries(cart).map(([id, q]) => { 
                const p = products.find(i => i.id === id); 
                return `${p.name} (${p.category}) x ${q} = $${p.proxyPrice * q}`; 
            }).join('\n');
            
            // 依照您要求的範例格式更新
            setGeneratedMsg(`【代購訂單確認】\n客戶：${customerName}\n\n訂單明細：\n${itemsText}\n\n總計金額：$${totalAmount}\n\n--- 匯款資訊 ---\n${settings.bankInfo}\n\n請於匯款後告知後五碼，謝謝！`);
        }} className="bg-white text-[#5D544C] px-8 py-3 rounded-2xl font-bold text-xs uppercase tracking-widest">產生訊息</button>
    </div>
)}
                                    {generatedMsg && (
                                        <div className="bg-white p-6 rounded-[2rem] border-2 border-[#F2ECE4] space-y-4 shadow-xl mb-32">
                                            <pre className="text-xs whitespace-pre-wrap leading-relaxed bg-[#F9F7F5] p-5 rounded-2xl max-h-48 overflow-y-auto">{generatedMsg}</pre>
                                            <button onClick={() => { navigator.clipboard.writeText(generatedMsg); setCopyStatus(true); setTimeout(()=>setCopyStatus(false),2000); }} className="w-full bg-[#F2ECE4] py-3 rounded-xl font-bold text-xs">{copyStatus?'已複製':'複製訊息'}</button>
                                            <button onClick={submitToSheets} disabled={isSubmitting} className="w-full bg-[#A68B77] text-white py-4 rounded-2xl font-black shadow-lg flex items-center justify-center gap-2">{isSubmitting ? <Icon name="Loader2" className="animate-spin" size={16}/> : <Icon name="Send" size={16}/>} 同步至總表</button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'admin' && (
                                <div className="space-y-6 animate-in">
                                    <section className="bg-white p-6 rounded-[2rem] border border-[#E5DED4] shadow-sm space-y-6">
                                        <h3 className="font-black text-base flex items-center gap-2"><Icon name="PlusCircle" size={18} className="text-[#A68B77]"/>錄入商品</h3>
                                        <div onClick={() => fileInputRef.current.click()} className="w-full h-40 bg-[#F9F7F5] rounded-2xl border-2 border-dashed border-[#DCD9CD] flex flex-col items-center justify-center cursor-pointer overflow-hidden relative group hover:border-[#A68B77]">
                                            {newProduct.imageUrl ? <img src={newProduct.imageUrl} className="w-full h-full object-cover" /> : <><Icon name="Camera" size={40} className="text-[#C4BCB4] mb-2"/><span className="text-[10px] font-black text-[#C4BCB4] uppercase">拍攝照片</span></>}
                                            {newProduct.imageUrl && <button onClick={(e)=>{e.stopPropagation(); setNewProduct(p=>({...p,imageUrl:''}));}} className="absolute top-2 right-2 bg-black/40 text-white p-1.5 rounded-full"><Icon name="X" size={14}/></button>}
                                        </div>
                                        <input type="file" accept="image/*" className="hidden" ref={fileInputRef} onChange={e => { const r = new FileReader(); r.onloadend = () => setNewProduct(p => ({...p, imageUrl: r.result})); r.readAsDataURL(e.target.files[0]); }} />
                                        <div className="space-y-4">
                                            <select className="w-full p-4 bg-white border border-[#E5DED4] rounded-2xl font-bold appearance-none shadow-sm" value={newProduct.category} onChange={e => setNewProduct(p => ({...p, category: e.target.value}))}>{settings.categories.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                            <input type="text" placeholder="品名" className="w-full p-4 bg-[#F9F7F5] rounded-2xl font-bold outline-none" value={newProduct.name} onChange={e => setNewProduct(p => ({...p, name: e.target.value}))} />
                                            <div className="grid grid-cols-2 gap-4">
                                                <input type="number" placeholder="原價" className="p-4 bg-[#F9F7F5] rounded-2xl font-bold outline-none" value={newProduct.originalPrice} onChange={e => { const pr = calculateProxyPrice(e.target.value); setNewProduct(p => ({...p, originalPrice: e.target.value, proxyPrice: pr})); }} />
                                                <input type="number" placeholder="代購價" className="p-4 bg-[#F9F7F5] rounded-2xl font-bold text-[#A68B77] outline-none" value={newProduct.proxyPrice} readOnly />
                                            </div>
                                        </div>
                                        <button onClick={async () => { await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('products').add({...newProduct, createdAt: Date.now()}); setNewProduct({category:'其他',name:'',originalPrice:'',proxyPrice:'',imageUrl:''}); alert('存入成功'); }} className="w-full bg-[#5D544C] text-white py-4 rounded-2xl font-black shadow-lg">存入庫存</button>
                                    </section>
                                </div>
                            )}

                            {activeTab === 'settings' && (
                                <div className="space-y-6 animate-in">
                                    <section className="bg-white p-7 rounded-[2rem] border border-[#E5DED4] shadow-sm space-y-7">
                                        <div className="space-y-4">
                                            <label className="text-[10px] font-black text-[#8C8179] flex items-center gap-2"><Icon name="Tag" size={14} className="text-[#A68B77]"/>分類管理</label>
                                            <div className="flex gap-2">
                                                <input type="text" placeholder="新類別" className="flex-1 p-3.5 bg-[#F9F7F5] rounded-xl text-xs font-bold outline-none" value={newCatInput} onChange={e => setNewCatInput(e.target.value)} />
                                                <button onClick={() => { if(!newCatInput || !user) return; const n={...settings,categories:[...settings.categories,newCatInput]}; setSettings(n); db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('config').set(n); setNewCatInput(''); }} className="bg-[#5D544C] text-white px-5 rounded-xl font-bold shadow-md active:scale-90 transition-transform">+</button>
                                            </div>
                                            <div className="flex flex-wrap gap-2 pt-2">
                                                {settings.categories.map(c => (
                                                    <span key={c} className="bg-[#F2ECE4] px-4 py-2 rounded-lg text-[10px] font-black border border-[#E5DED4] flex items-center gap-2 text-[#5D544C]">
                                                        {c}
                                                        {c!=='其他' && <button onClick={()=>{ if(!user) return; const n={...settings,categories:settings.categories.filter(x=>x!==c)};setSettings(n);db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('config').set(n);}}><Icon name="X" size={10}/></button>}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="h-px bg-[#F2ECE4] w-full"></div>
                                        <div className="space-y-4">
                                            <label className="text-[10px] font-black text-[#8C8179] flex items-center gap-2"><Icon name="Tag" size={14} className="text-[#A68B77]"/>匯款資訊範本</label>
                                            <textarea rows="5" className="w-full p-5 bg-[#F9F7F5] rounded-2xl text-xs font-mono outline-none text-[#5D544C] border border-[#E5DED4]" value={settings.bankInfo} onChange={e => setSettings({...settings, bankInfo: e.target.value})} />
                                        </div>
                                        <button onClick={saveGlobalSettings} className="w-full bg-[#5D544C] text-white py-4 rounded-2xl font-black shadow-lg">更新系統設定</button>
                                    </section>
                                </div>
                            )}
                        </main>
                        <footer className="py-10 text-center opacity-20 text-[9px] font-bold tracking-[0.4em]">© 2026 PROXY ASSISTANT</footer>
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        })();
    </script>
</body>
</html>
