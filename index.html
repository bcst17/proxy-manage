<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人代購作業助手</title>
    
    <!-- 1. PWA 與 App Icon 設定 -->
    <!-- 請確保您的圖片檔名為 icon.png 且與此檔案放在 GitHub 同一個路徑下 -->
    <link rel="apple-touch-icon" href="icon1.png">
    <link rel="icon" type="image/png" href="icon1.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="代購助手">

    <!-- 2. 載入 CSS 與 字體 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F2ECE4; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
        select { -webkit-appearance: none; appearance: none; }
    </style>

    <!-- 3. 核心庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- 4. Firebase SDK (Compat 版) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- 5. Babel 轉譯器 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.10/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        (() => {
            const { useState, useEffect, useMemo, useRef } = React;
            
            // --- 內嵌式 SVG 圖標組件 ---
            const Icon = ({ name, size = 24, className = "" }) => {
                const paths = {
                    Package: <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />,
                    ShoppingCart: <><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></>,
                    Camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>,
                    Settings: <><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>,
                    PlusCircle: <><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></>,
                    MinusCircle: <><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></>,
                    ChevronDown: <path d="M6 9l6 6 6-6"/>,
                    Loader2: <path d="M21 12a9 9 0 1 1-6.21-8.56"/>,
                    Copy: <><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></>,
                    Send: <><path d="M22 2l-7 20-4-9-9-4Z"/><path d="M22 2L11 13"/></>,
                    X: <path d="M18 6L6 18M6 6l12 12"/>,
                    Tag: <><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></>,
                    Calculator: <><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01M12 10h.01M8 10h.01M12 14h.01M8 14h.01M12 18h.01M8 18h.01"/></>,
                    Trash2: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>
                };

                return (
                    <svg 
                        xmlns="http://www.w3.org/2000/svg" 
                        width={size} 
                        height={size} 
                        viewBox="0 0 24 24" 
                        fill="none" 
                        stroke="currentColor" 
                        strokeWidth="2" 
                        strokeLinecap="round" 
                        strokeLinejoin="round" 
                        className={`shrink-0 ${className}`}
                    >
                        {paths[name] || null}
                    </svg>
                );
            };

            // --- 核心配置：Firebase 資訊 ---
            const firebaseConfig = {
                apiKey: "AIzaSyASLINtHCAfw8kzW00vENpqMP1--I6eHWE",
                authDomain: "my-proxy-helper.firebaseapp.com",
                projectId: "my-proxy-helper",
                storageBucket: "my-proxy-helper.firebasestorage.app",
                messagingSenderId: "692403246929",
                appId: "1:692403246929:web:94dade7422ad100918a570"
            };

            const GAS_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbx8k3PYh9E2yrQaJcSPHjswMr4Vf4e9_HY9P1b_lBtV35NoTpqkMg1jk1zbBodQJ1zSYg/exec";

            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();
            const appId = 'proxy-assistant-v1';

            const App = () => {
                const [user, setUser] = useState(null);
                const [activeTab, setActiveTab] = useState('order');
                const [products, setProducts] = useState([]);
                const [loading, setLoading] = useState(true);
                const [customerName, setCustomerName] = useState('');
                const [cart, setCart] = useState({});
                const [generatedMsg, setGeneratedMsg] = useState('');
                const [copyStatus, setCopyStatus] = useState(false);
                const [isSubmitting, setIsSubmitting] = useState(false);
                const [orderFilterCategory, setOrderFilterCategory] = useState('全部');
                const [adminFilterCategory, setAdminFilterCategory] = useState('全部');
                const [settings, setSettings] = useState({
                    bankInfo: '銀行代碼：000\n帳號：1234-5678-9012\n戶名：您的名字',
                    categories: ["哆啦A夢", "進擊的巨人", "任天堂", "迪士尼", "Beams", "其他"],
                    targetSheetName: '4/29~5/5東京函館' // 優化：新增目標分頁名稱設定
                });
                const [newProduct, setNewProduct] = useState({ category: '', name: '', originalPrice: '', proxyPrice: '', imageUrl: '' });
                const [newCatInput, setNewCatInput] = useState('');
                const fileInputRef = useRef(null);

                useEffect(() => {
                    auth.signInAnonymously().then(cred => {
                        setUser(cred.user);
                    });
                    
                    const unsubP = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('products')
                        .onSnapshot((snap) => {
                            const pList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                            pList.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
                            setProducts(pList);
                            setLoading(false);
                        }, () => setLoading(false));

                    const unsubAuth = auth.onAuthStateChanged(u => {
                        if(u) {
                            setUser(u);
                            db.collection('artifacts').doc(appId).collection('users').doc(u.uid).collection('settings').doc('config')
                            .onSnapshot(doc => { if(doc.exists) setSettings(prev => ({...prev, ...doc.data()})); });
                        }
                    });
                    return () => { unsubP(); unsubAuth(); };
                }, []);

                const calculateProxyPrice = (orig) => {
                    if (!orig || isNaN(orig)) return '';
                    const raw = Number(orig) * 0.2 * 1.1;
                    return raw % 10 === 0 ? raw : Math.ceil(raw / 10) * 10;
                };

                const generateMessage = () => {
                    if (!customerName) return alert("請輸入客戶姓名");
                    const itemsText = Object.entries(cart).map(([id, qty]) => {
                        const p = products.find(item => item.id === id);
                        return `${p.name} (${p.category}) x ${qty} = $${p.proxyPrice * qty}`;
                    }).join('\n');
                    const total = Object.entries(cart).reduce((s, [id, q]) => s + (products.find(p=>p.id===id)?.proxyPrice || 0) * q, 0);
                    const deposit = total * 0.5;
                    setGeneratedMsg(`【代購訂單確認】\n客戶：${customerName}\n\n訂單明細：\n${itemsText}\n\n總計金額：$${total}\n訂金金額：$${deposit}\n\n--- 匯款資訊 ---\n${settings.bankInfo}\n\n請匯款訂金後告知帳號後五碼，謝謝！`);
                };

                const submitToSheets = async () => {
                    setIsSubmitting(true);
                    const orderItems = Object.entries(cart).map(([id, qty]) => {
                        const p = products.find(item => item.id === id);
                        return { category: p.category, name: p.name, origPrice: p.originalPrice, proxyPrice: p.proxyPrice, qty };
                    });
                    try {
                        await fetch(GAS_WEBHOOK_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ customerName, items: orderItems, timestamp: new Date().toLocaleString() }) });
                        alert("同步成功！");
                        setCart({}); setCustomerName(''); setGeneratedMsg('');
                    } catch (e) { alert("同步失敗"); }
                    finally { setIsSubmitting(false); }
                };

                if (loading) return <div className="flex h-screen items-center justify-center"><Icon name="Loader2" className="animate-spin text-[#A68B77]" size={40} /></div>;

                return (
                    <div className="max-w-md mx-auto min-h-screen flex flex-col text-[#5D544C]">
                        <header className="px-6 py-6 flex justify-between items-center bg-white/40 backdrop-blur-md sticky top-0 z-50">
                            <h1 className="text-xl font-bold flex items-center gap-2 overflow-hidden">
                                <Icon name="Package" className="text-[#A68B77]" size={22} />
                                <span className="truncate">代購小助手</span>
                            </h1>
                            <div className="flex items-center gap-1.5 px-2.5 py-1 bg-white/60 rounded-full border border-[#E5DED4] shrink-0">
                                <div className="w-1.5 h-1.5 bg-[#A68B77] rounded-full animate-pulse"></div>
                                <span className="text-[10px] font-bold">連線中</span>
                            </div>
                        </header>

                        <main className="flex-1 px-5 py-4 pb-32">
                            <div className="flex gap-1.5 mb-8 bg-[#EAE3DB] p-1.5 rounded-2xl shadow-inner">
                                {[
                                    { id: 'order', label: '接單', icon: 'ShoppingCart' },
                                    { id: 'admin', label: '管理', icon: 'Camera' },
                                    { id: 'settings', label: '設定', icon: 'Settings' },
                                ].map(t => (
                                    <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex-1 flex flex-col items-center py-2.5 rounded-xl transition-all duration-300 ${activeTab === t.id ? 'bg-white shadow-sm' : 'opacity-60'}`}>
                                        <Icon name={t.icon} size={18}/>
                                        <span className="text-[10px] font-black mt-1">{t.label}</span>
                                    </button>
                                ))}
                            </div>

                            {activeTab === 'order' && (
                                <div className="space-y-6 animate-in">
                                    <section className="bg-white p-6 rounded-[2rem] border border-[#E5DED4] shadow-sm space-y-4">
                                        <input type="text" placeholder="客戶姓名" className="w-full p-4 bg-[#F9F7F5] rounded-2xl outline-none font-bold" value={customerName} onChange={e => setCustomerName(e.target.value)} />
                                        <div className="relative">
                                            <select className="w-full p-4 bg-white border border-[#E5DED4] rounded-2xl font-bold appearance-none" value={orderFilterCategory} onChange={e => setOrderFilterCategory(e.target.value)}>
                                                <option value="全部">全部商品</option>
                                                {settings.categories.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                            <Icon name="ChevronDown" className="absolute right-4 top-1/2 -translate-y-1/2 text-[#C4BCB4]" size={16}/>
                                        </div>
                                    </section>
                                    <div className="space-y-3 pb-20">
                                        {products.filter(p => orderFilterCategory === '全部' || p.category === orderFilterCategory).map(p => (
                                            <div key={p.id} className="bg-white p-3 rounded-2xl border border-[#E5DED4] flex items-center gap-4 shadow-sm active:scale-[0.98]">
                                                <div className="w-20 h-20 bg-[#F9F7F5] rounded-xl overflow-hidden shrink-0">
                                                    {p.imageUrl ? <img src={p.imageUrl} className="w-full h-full object-cover" /> : <Icon name="Package" className="m-7 text-[#D9C5B2]" size={24} />}
                                                </div>
                                                <div className="flex-1 truncate">
                                                    <p className="text-[9px] font-black text-[#A68B77] uppercase">{p.category}</p>
                                                    <h4 className="font-bold text-sm truncate">{p.name}</h4>
                                                    <p className="font-black text-[#A68B77] text-lg">${p.proxyPrice}</p>
                                                </div>
                                                <div className="flex items-center gap-3 bg-[#F9F7F5] p-1.5 rounded-full border border-[#E5DED4]">
                                                    <button onClick={() => { const q = (cart[p.id] || 0) - 1; if(q<=0){const {[p.id]:_, ...rest}=cart; setCart(rest)}else{setCart({...cart,[p.id]:q})} }}><Icon name="MinusCircle" size={28} className="text-[#C4BCB4]"/></button>
                                                    <span className="font-bold min-w-[20px] text-center text-sm">{cart[p.id] || 0}</span>
                                                    <button onClick={() => setCart({...cart,[p.id]:(cart[p.id]||0)+1})}><Icon name="PlusCircle" size={28} className="text-[#A68B77]"/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    {Object.keys(cart).length > 0 && (
                                        <div className="fixed bottom-6 left-4 right-4 bg-[#5D544C] text-white p-5 rounded-[2rem] flex justify-between items-center shadow-xl z-50 animate-in slide-in-from-bottom">
                                            <p className="text-2xl font-black ml-2">${Object.entries(cart).reduce((s,[id,q])=>s+(products.find(p=>p.id===id)?.proxyPrice||0)*q,0)}</p>
                                            <button onClick={generateMessage} className="bg-white text-[#5D544C] px-8 py-3 rounded-2xl font-bold text-xs uppercase tracking-widest active:scale-95 transition-all">產生訊息</button>
                                        </div>
                                    )}
                                    {generatedMsg && (
                                        <div className="bg-white p-6 rounded-[2rem] border-2 border-[#F2ECE4] space-y-4 shadow-xl mb-32">
                                            <pre className="text-xs whitespace-pre-wrap leading-relaxed bg-[#F9F7F5] p-5 rounded-2xl max-h-48 overflow-y-auto font-sans">{generatedMsg}</pre>
                                            <button onClick={() => { navigator.clipboard.writeText(generatedMsg); setCopyStatus(true); setTimeout(()=>setCopyStatus(false),2000); }} className="w-full bg-[#F2ECE4] py-3 rounded-xl font-bold text-xs">{copyStatus?'已複製':'複製訊息'}</button>
                                            <button onClick={submitToSheets} disabled={isSubmitting} className="w-full bg-[#A68B77] text-white py-4 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2 active:scale-[0.98] transition-all disabled:bg-[#C4BCB4]">{isSubmitting ? <Icon name="Loader2" className="animate-spin" size={16}/> : <Icon name="Send" size={16}/>} 同步至總表</button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'admin' && (
                                <div className="space-y-6 animate-in">
                                    <section className="bg-white p-6 rounded-[2rem] border border-[#E5DED4] shadow-sm space-y-6">
                                        <h3 className="font-black text-base text-[#5D544C] flex items-center gap-2 tracking-tight"><Icon name="PlusCircle" size={18} className="text-[#A68B77]"/>登錄商品</h3>
                                        <div onClick={() => fileInputRef.current.click()} className="w-full h-40 bg-[#F9F7F5] rounded-2xl border-2 border-dashed border-[#DCD9CD] flex flex-col items-center justify-center cursor-pointer overflow-hidden relative group hover:border-[#A68B77] transition-colors">
                                            {newProduct.imageUrl ? <img src={newProduct.imageUrl} className="w-full h-full object-cover" /> : <><Icon name="Camera" size={40} className="text-[#C4BCB4] mb-2"/><span className="text-[10px] font-black text-[#C4BCB4] uppercase">拍攝照片</span></>}
                                            {newProduct.imageUrl && <button onClick={(e)=>{e.stopPropagation(); setNewProduct(p=>({...p,imageUrl:''})); if(fileInputRef.current) fileInputRef.current.value='';}} className="absolute top-2 right-2 bg-black/40 text-white p-1.5 rounded-full"><Icon name="X" size={14}/></button>}
                                        </div>
                                        <input type="file" accept="image/*" className="hidden" ref={fileInputRef} onChange={e => { const r = new FileReader(); r.onloadend = () => setNewProduct(p => ({...p, imageUrl: r.result})); r.readAsDataURL(e.target.files[0]); }} />
                                        <div className="space-y-4">
                                            <div className="relative">
                                                <select className="w-full p-4 bg-white border border-[#E5DED4] rounded-2xl font-bold appearance-none" value={newProduct.category} onChange={e => setNewProduct(p => ({...p, category: e.target.value}))}>
                                                    <option value="" disabled>請選擇類別</option>
                                                    {settings.categories.map(c => <option key={c} value={c}>{c}</option>)}
                                                </select>
                                                <Icon name="ChevronDown" className="absolute right-4 top-1/2 -translate-y-1/2 text-[#C4BCB4]" size={16}/>
                                            </div>
                                            <input type="text" placeholder="品名" className="w-full p-4 bg-[#F9F7F5] rounded-2xl font-bold outline-none placeholder:text-[#C4BCB4]" value={newProduct.name} onChange={e => setNewProduct(p => ({...p, name: e.target.value}))} />
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="flex flex-col space-y-1.5">
                                                    <label className="text-[10px] font-black text-[#8C8179] uppercase ml-1">原價</label>
                                                    <input 
                                                        type="number" 
                                                        inputMode="numeric"
                                                        pattern="[0-9]*"
                                                        placeholder="0" 
                                                        className="w-full p-4 bg-[#F9F7F5] rounded-2xl font-bold outline-none h-[56px] placeholder:text-[#C4BCB4]" 
                                                        value={newProduct.originalPrice} 
                                                        onChange={e => { const pr = calculateProxyPrice(e.target.value); setNewProduct(p => ({...p, originalPrice: e.target.value, proxyPrice: pr})); }} 
                                                    />
                                                </div>
                                                <div className="flex flex-col space-y-1.5">
                                                    <label className="text-[10px] font-black text-[#A68B77] uppercase ml-1 flex items-center gap-1">代購價 <Icon name="Calculator" size={10}/></label>
                                                    <input type="number" placeholder="自動算" className="w-full p-4 bg-[#F9F7F5] rounded-2xl font-bold text-[#A68B77] outline-none h-[56px]" value={newProduct.proxyPrice} readOnly />
                                                </div>
                                            </div>
                                        </div>
                                        <button onClick={async () => { 
                                            if(!newProduct.category) return alert("請選擇商品類別");
                                            if(!newProduct.name) return alert("請輸入商品名稱");
                                            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('products').add({...newProduct, createdAt: Date.now()}); 
                                            setNewProduct({category:'',name:'',originalPrice:'',proxyPrice:'',imageUrl:''}); 
                                            alert('加入成功'); 
                                        }} className="w-full bg-[#5D544C] text-white py-4 rounded-2xl font-black shadow-lg active:scale-[0.98] transition-all">加入庫存</button>
                                    </section>

                                    <section className="space-y-3 pb-20">
                                        <div className="flex justify-between items-center ml-2 mr-2">
                                            <h3 className="font-black text-xs text-[#8C8179] uppercase tracking-widest">庫存管理 ({products.filter(p => adminFilterCategory === '全部' || p.category === adminFilterCategory).length})</h3>
                                            <div className="relative min-w-[120px]">
                                                <select className="w-full py-1.5 pl-3 pr-8 bg-white border border-[#E5DED4] rounded-xl text-[10px] font-bold appearance-none" value={adminFilterCategory} onChange={e => setAdminFilterCategory(e.target.value)}>
                                                    <option value="全部">全部類別</option>
                                                    {settings.categories.map(c => <option key={c} value={c}>{c}</option>)}
                                                </select>
                                                <Icon name="ChevronDown" className="absolute right-2 top-1/2 -translate-y-1/2 text-[#C4BCB4]" size={12}/>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            {products.filter(p => adminFilterCategory === '全部' || p.category === adminFilterCategory).map(p => (
                                                <div key={p.id} className="bg-white p-2.5 rounded-2xl border border-[#E5DED4] shadow-sm relative group animate-in">
                                                    <div className="aspect-square bg-[#F9F7F5] rounded-xl overflow-hidden mb-2 border border-[#eee]">
                                                        {p.imageUrl ? <img src={p.imageUrl} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-[#D9C5B2]"><Icon name="Package" size={24} /></div>}
                                                    </div>
                                                    <p className="text-[9px] font-black text-[#C4BCB4] uppercase truncate">{p.category}</p>
                                                    <p className="text-xs font-black truncate">{p.name}</p>
                                                    <p className="text-[#A68B77] font-black text-sm mt-0.5">${p.proxyPrice}</p>
                                                    <button 
                                                        onClick={async () => { if(window.confirm('確定刪除此商品？')) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('products').doc(p.id).delete(); }} 
                                                        className="absolute top-1 right-1 bg-white/90 text-red-400 p-1.5 rounded-full shadow-sm hover:text-red-600 transition-colors"
                                                    >
                                                        <Icon name="Trash2" size={12} />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            )}

                            {activeTab === 'settings' && (
                                <div className="space-y-6 animate-in">
                                    <section className="bg-white p-7 rounded-[2rem] border border-[#E5DED4] shadow-sm space-y-7">
                                        <div className="space-y-4">
                                            <label className="text-[10px] font-black text-[#8C8179] flex items-center gap-2"><Icon name="Tag" size={14} className="text-[#A68B77]"/>分類項目管理</label>
                                            <div className="flex gap-2">
                                                <input type="text" placeholder="新類別" className="flex-1 p-3.5 bg-[#F9F7F5] rounded-xl text-xs font-bold outline-none" value={newCatInput} onChange={e => setNewCatInput(e.target.value)} />
                                                <button onClick={() => { if(!newCatInput || !user) return; const n={...settings,categories:[...settings.categories,newCatInput]}; setSettings(n); db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('config').set(n); setNewCatInput(''); }} className="bg-[#5D544C] text-white px-5 rounded-xl font-bold shadow-md active:scale-90 transition-transform">+</button>
                                            </div>
                                            <div className="flex flex-wrap gap-2 pt-2">
                                                {settings.categories.map(c => (
                                                    <span key={c} className="bg-[#F2ECE4] px-4 py-2 rounded-lg text-[10px] font-black border border-[#E5DED4] flex items-center gap-2 text-[#5D544C]">
                                                        {c}
                                                        <button onClick={()=>{ if(!user) return; const n={...settings,categories:settings.categories.filter(x=>x!==c)};setSettings(n);db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('config').set(n);}}><Icon name="X" size={10}/></button>
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="h-px bg-[#F2ECE4] w-full"></div>
                                        <div className="space-y-4">
                                            <label className="text-[10px] font-black text-[#8C8179] flex items-center gap-2"><Icon name="Tag" size={14} className="text-[#A68B77]"/>匯款資訊範本</label>
                                            <textarea rows="5" className="w-full p-5 bg-[#F9F7F5] rounded-2xl text-xs font-mono outline-none text-[#5D544C] border border-[#E5DED4]" value={settings.bankInfo} onChange={e => setSettings({...settings, bankInfo: e.target.value})} />
                                        </div>
                                        <button onClick={async () => {
                                            if(!user) return;
                                            try {
                                                await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('config').set(settings);
                                                alert("設定更新成功");
                                            } catch (e) { alert("儲存失敗"); }
                                        }} className="w-full bg-[#5D544C] text-white py-4 rounded-2xl font-black shadow-lg">更新系統設定</button>
                                    </section>
                                </div>
                            )}
                        </main>
                        <footer className="py-10 text-center opacity-20 text-[9px] font-bold tracking-[0.4em]">© 2026 PROXY ASSISTANT</footer>
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        })();
    </script>
</body>
</html>
